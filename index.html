<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>E Agenda Limapuluh</title>
  <link rel="icon" href="https://www.pekanbaru.go.id/assets/img/logo_kota.png" type="image/x-icon">

  <!-- Redirect langsung tanpa iframe -->
  <meta http-equiv="refresh" content="2;url=https://script.google.com/macros/s/AKfycbxeogDA0NvcAkcvKdNXCdyrVrDRbj01stIYw5laAqTovPoPBBLkTbOfxfPdPUvoA9DZ/exec" />

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f1117;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* ====== Halaman Redirect ====== */
    .redirect-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      text-align: center;
      padding: 24px;
    }

    .app-logo {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      object-fit: contain;
      margin-bottom: 24px;
      background: rgba(232, 160, 48, 0.1);
      padding: 12px;
    }

    .app-title {
      font-size: 1.6rem;
      font-weight: 800;
      color: #e8a030;
      letter-spacing: 2px;
      margin-bottom: 8px;
    }

    .app-subtitle {
      font-size: 0.9rem;
      color: #5a5f6a;
      margin-bottom: 32px;
      letter-spacing: 0.5px;
    }

    /* Spinner */
    .spinner {
      width: 44px;
      height: 44px;
      border: 3.5px solid rgba(255, 255, 255, 0.08);
      border-top-color: #e8a030;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-text {
      font-size: 0.9rem;
      color: #8a8f9a;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* Tombol manual */
    .manual-btn {
      display: none;
      padding: 12px 32px;
      border: none;
      border-radius: 10px;
      background: #e8a030;
      color: #0f1117;
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.15s;
    }

    .manual-btn:hover {
      background: #d4911e;
    }

    .manual-btn:active {
      transform: scale(0.96);
    }

    .manual-btn.visible {
      display: inline-flex;
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Countdown ring */
    .countdown-ring {
      position: relative;
      width: 52px;
      height: 52px;
      margin-bottom: 12px;
    }

    .countdown-ring svg {
      transform: rotate(-90deg);
      width: 52px;
      height: 52px;
    }

    .countdown-ring circle {
      fill: none;
      stroke-width: 3;
    }

    .countdown-ring .track {
      stroke: rgba(255, 255, 255, 0.06);
    }

    .countdown-ring .progress {
      stroke: #e8a030;
      stroke-linecap: round;
      stroke-dasharray: 138.23;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 0.1s linear;
    }

    .countdown-number {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 700;
      color: #e8a030;
    }

    /* Error state */
    .error-box {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      animation: fadeInUp 0.4s ease forwards;
    }

    .error-box.visible {
      display: flex;
    }

    .error-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(239, 68, 68, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
    }

    .error-icon svg {
      width: 26px;
      height: 26px;
      color: #ef4444;
    }

    .error-box h3 {
      color: #ef4444;
      font-size: 1.05rem;
      margin-bottom: 6px;
    }

    .error-box p {
      color: #8a8f9a;
      font-size: 0.85rem;
      max-width: 300px;
      line-height: 1.5;
      margin-bottom: 20px;
    }

    .retry-btn {
      padding: 10px 28px;
      border: none;
      border-radius: 8px;
      background: rgba(239, 68, 68, 0.15);
      color: #ef4444;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .retry-btn:hover {
      background: rgba(239, 68, 68, 0.25);
    }

    .retry-btn:active {
      transform: scale(0.96);
    }

    /* Footer info */
    .footer-info {
      position: fixed;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.72rem;
      color: #3a3f4a;
      letter-spacing: 0.5px;
      padding-bottom: env(safe-area-inset-bottom);
    }

    @media (max-width: 480px) {
      .app-title { font-size: 1.3rem; }
      .app-logo { width: 64px; height: 64px; border-radius: 16px; }
    }
  </style>
</head>
<body>

  <div class="redirect-page">

    <!-- Logo aplikasi -->
    <img
      class="app-logo"
      src="https://www.pekanbaru.go.id/assets/img/logo_kota.png"
      alt="Logo"
      onerror="this.style.display='none'"
    />

    <div class="app-title">E AGENDA LIMAPULUH</div>
    <div class="app-subtitle">Sistem Informasi Elektronik</div>

    <!-- Loading state -->
    <div id="loadingState">
      <div class="countdown-ring">
        <svg viewBox="0 0 52 52">
          <circle class="track" cx="26" cy="26" r="22" />
          <circle class="progress" id="progressCircle" cx="26" cy="26" r="22" />
        </svg>
        <div class="countdown-number" id="countdownNum">3</div>
      </div>
      <div class="status-text" id="statusText">Mengalihkan ke aplikasi...</div>
    </div>

    <!-- Tombol manual (muncul jika redirect otomatis gagal) -->
    <a
      class="manual-btn"
      id="manualBtn"
      href="https://script.google.com/macros/s/AKfycbxeogDA0NvcAkcvKdNXCdyrVrDRbj01stIYw5laAqTovPoPBBLkTbOfxfPdPUvoA9DZ/exec"
    >
      Buka Aplikasi Sekarang
    </a>

    <!-- Error state -->
    <div class="error-box" id="errorBox">
      <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 11-18 0 9 9 0 0118 0zm-9 3.75h.008v.008H12v-.008z" />
        </svg>
      </div>
      <h3>Gagal Mengalihkan</h3>
      <p>Periksa koneksi internet Anda dan coba lagi.</p>
      <button class="retry-btn" onclick="retryRedirect()">Coba Lagi</button>
    </div>

  </div>

  <div class="footer-info">IT LIMAPULUH &mdash; Pekanbaru</div>

  <script>
    const TARGET_URL = 'https://script.google.com/macros/s/AKfycbxeogDA0NvcAkcvKdNXCdyrVrDRbj01stIYw5laAqTovPoPBBLkTbOfxfPdPUvoA9DZ/exec';

    const loadingState = document.getElementById('loadingState');
    const manualBtn    = document.getElementById('manualBtn');
    const errorBox     = document.getElementById('errorBox');
    const statusText   = document.getElementById('statusText');
    const progressCircle = document.getElementById('progressCircle');
    const countdownNum = document.getElementById('countdownNum');

    // Konfigurasi
    const REDIRECT_DELAY  = 3;   // detik countdown
    const FALLBACK_DELAY  = 5000; // ms, tampilkan tombol manual jika redirect belum terjadi
    const ERROR_TIMEOUT   = 15000; // ms, tampilkan error jika tetap tidak bisa

    // Hitung keliling lingkaran progress
    const CIRCUMFERENCE = 2 * Math.PI * 22; // r=22
    progressCircle.style.strokeDasharray = CIRCUMFERENCE;
    progressCircle.style.strokeDashoffset = 0;

    let countdownValue = REDIRECT_DELAY;
    let intervalId = null;
    let fallbackTimer = null;
    let errorTimer = null;

    /**
     * Mulai countdown lalu redirect
     */
    function startRedirect() {
      // Tampilkan loading, sembunyikan error & tombol manual
      loadingState.style.display = 'block';
      errorBox.classList.remove('visible');
      manualBtn.classList.remove('visible');
      countdownValue = REDIRECT_DELAY;
      countdownNum.textContent = countdownValue;
      progressCircle.style.strokeDashoffset = 0;

      // Countdown setiap detik
      intervalId = setInterval(() => {
        countdownValue--;
        countdownNum.textContent = Math.max(0, countdownValue);

        // Animasi progress ring
        const elapsed = REDIRECT_DELAY - countdownValue;
        const offset = (elapsed / REDIRECT_DELAY) * CIRCUMFERENCE;
        progressCircle.style.strokeDashoffset = -offset;

        if (countdownValue <= 0) {
          clearInterval(intervalId);
          doRedirect();
        }
      }, 1000);

      // Fallback: jika setelah 5 detik belum pindah, tampilkan tombol manual
      fallbackTimer = setTimeout(() => {
        statusText.textContent = 'Redirect sedang berlangsung...';
        manualBtn.classList.add('visible');
      }, FALLBACK_DELAY);

      // Error timeout: jika setelah 15 detik belum pindah, tampilkan error
      errorTimer = setTimeout(() => {
        clearInterval(intervalId);
        loadingState.style.display = 'none';
        manualBtn.classList.remove('visible');
        errorBox.classList.add('visible');
      }, ERROR_TIMEOUT);
    }

    /**
     * Lakukan redirect menggunakan location.replace
     * location.replace tidak menambah history entry
     */
    function doRedirect() {
      statusText.textContent = 'Membuka aplikasi...';
      window.location.replace(TARGET_URL);
    }

    /**
     * Tombol coba lagi
     */
    function retryRedirect() {
      clearTimeout(fallbackTimer);
      clearTimeout(errorTimer);
      clearInterval(intervalId);
      startRedirect();
    }

    // Deteksi online/offline
    window.addEventListener('offline', () => {
      clearInterval(intervalId);
      clearTimeout(fallbackTimer);
      clearTimeout(errorTimer);
      loadingState.style.display = 'none';
      manualBtn.classList.remove('visible');
      errorBox.classList.add('visible');
    });

    window.addEventListener('online', () => {
      if (errorBox.classList.contains('visible')) {
        retryRedirect();
      }
    });

    // Mulai saat halaman siap
    startRedirect();
  </script>

</body>
</html>
